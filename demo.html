<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo Video • Gotta Minute Fit Lab</title>

  <link rel="stylesheet" href="styles.css" />
  <meta
    name="description"
    content="Demo video for the Gotta Minute Fit Lab capstone project."
  />
</head>

<body>
  <!-- Universal Navigation -->
  <div id="nav-mount"></div>

  <main class="hero hero-page">
    <div class="hero-inner">
      <h1>Demo Video</h1>
      <p class="subtitle">
        Watch the demo of <strong>Gotta Minute Fit Lab</strong>.
      </p>

      <section class="doc-section">
        <div class="doc-card">
          <div>
            <div class="doc-title">Project Demo</div>
            <div class="doc-meta">YouTube</div>
          </div>
          <a
            class="btn"
            href="https://youtu.be/J8rjOM7uw9c"
            target="_blank"
            rel="noopener"
          >
            Open on YouTube
          </a>
        </div>

        <!-- Embedded Video -->
        <div class="slide-embed">
          <iframe
            src="https://www.youtube.com/embed/J8rjOM7uw9c"
            title="Gotta Minute Fit Lab Demo Video"
            frameborder="0"
            width="100%"
            height="480"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen
          ></iframe>
        </div>
      </section>

      <footer class="footer">
        <p>© 2026 Gotta Minute Fit Lab • Capstone project website</p>
      </footer>
    </div>
  </main>

  <!-- Shared Scripts -->
  <script src="include-nav.js"></script>
  <script src="nav.js" defer></script>
</body>
</html>
